name: 功能建议
description: 想加个功能 / 改进交互
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题
      description: 你遇到了什么不方便的地方？
      placeholder: 例：每次换分辨率都要手改 INPUT_FIELD 坐标
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      placeholder: 例：自动定位输入框（OCR 或图像匹配）

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      placeholder: 例：让用户在配置里写个 ratio，工具自动按分辨率换算

  - type: textarea
    id: context
    attributes:
      label: 补充上下文
      description: 截图、相关 issue / PR、参考实现等
